<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ألعاب الجمعة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:#0a0a0a;color:#f0ead6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;gap:28px}
body{background:radial-gradient(ellipse 80% 50% at 50% 30%,#12100a,#0a0a0a 70%)}
h1{font-size:clamp(2rem,8vw,3.5rem);font-weight:900;color:#c9a84c;text-align:center;letter-spacing:-2px}
p{color:#9a8f6f;font-size:.9rem;text-align:center}
.games{display:flex;flex-direction:column;gap:16px;width:100%;max-width:380px}
.game-card{
  background:#181610;border:1px solid rgba(201,168,76,.15);border-radius:16px;
  padding:22px 20px;display:flex;align-items:center;gap:16px;
  text-decoration:none;color:inherit;transition:transform .12s,border-color .2s;
}
.game-card:active{transform:scale(.97)}
.game-card:hover{border-color:rgba(201,168,76,.4)}
.gc-icon{font-size:2.8rem;flex-shrink:0}
.gc-info h2{font-size:1.15rem;font-weight:900;margin-bottom:4px}
.gc-info p{font-size:.8rem;color:#9a8f6f;line-height:1.6;text-align:right}
.gc-arrow{font-size:1.2rem;color:#5a5040;margin-right:auto;flex-shrink:0}
</style>
</head>
<body>
  <h1>🎮 ألعاب الجمعة</h1>
  <p>اختر لعبتك</p>
  <div class="games">
    <a class="game-card" href="/codenames">
      <div class="gc-icon">🕵️</div>
      <div class="gc-info">
        <h2>العملاء السريون</h2>
        <p>Codenames بالخليجي — فريقين يخمنون الكلمات السرية</p>
      </div>
      <div class="gc-arrow">←</div>
    </a>
    <a class="game-card" href="/mafia">
      <div class="gc-icon">🌑</div>
      <div class="gc-info">
        <h2>المافيا</h2>
        <p>AI هوست يدير اللعبة — أدوار سرية ومهام ليلية</p>
      </div>
      <div class="gc-arrow">←</div>
    </a>
  </div>
</body>
</html>
